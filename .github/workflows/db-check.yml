name: Verify MongoDB Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-database-connection:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Install the correct version of Python
    - name: Set up Python 3.x
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install the required MongoDB libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymongo dnspython

    # 4. Run our automated connection test script!
    # This requires the MONGODB_URI to be securely stored in GitHub Secrets.
    - name: Ping MongoDB Atlas
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
      run: |
        python mongodbPing.py
